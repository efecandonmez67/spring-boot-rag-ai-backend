services:
  db:
    image: ankane/pgvector:latest
    container_name: postgres-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: efecan
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: rag_db
    networks:
      - rag-network

  app:
    build: .
    container_name: spring-ai-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rag_db
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - db
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge